<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTU8_M7m9TFx-lH6k6ZHA_q1MZDa_t5zCXhKw&s" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>ORAs</title>
    <style>
      /* Splash Screen Styles */
      body { margin: 0; background-color: #0c1425; }
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0c1425;
        z-index: 9999;
        color: white;
        font-family: sans-serif;
      }
      .splash-logo {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        animation: pulse 2s infinite ease-in-out;
        margin-bottom: 24px;
      }
      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
        70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
      }
    </style>
  </head>
  <body>
    <!-- Preview/Splash Screen -->

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          var base = document.querySelector('base');
          var basePath = base ? base.getAttribute('href') : '/';
          window.history.replaceState(null, '', basePath + redirect);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
