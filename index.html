    <script>
      (function() {
        try {
          var isDark = false;
          var stored = localStorage.getItem('ORAs_settings');
          var theme = 'system';
          if (stored) {
            var parsed = JSON.parse(stored);
            if (parsed && parsed.theme) theme = parsed.theme;
          } else {
            var nextTheme = localStorage.getItem('theme');
            if (nextTheme) theme = nextTheme;
          }
          if (theme === 'dark') {
            isDark = true;
          } else if (theme === 'system') {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          if (isDark) document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
    <style>
      /* Splash Screen Styles */
      body { margin: 0; background-color: #0c1425; }
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0c1425;
        z-index: 9999;
        color: white;
        font-family: sans-serif;
      }
      .splash-logo {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        animation: pulse 2s infinite ease-in-out;
        margin-bottom: 24px;
      }
      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
        70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
      }
    </style>
