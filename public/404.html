<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ORAs</title>
  <script>
    // GitHub Pages SPA redirect: save the path, redirect to root
    var pathSegmentsToKeep = 1; // '/ora/' is 1 segment
    var l = window.location;
    sessionStorage.setItem('spa-redirect',
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
      l.search + l.hash
    );
    l.replace(l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/');
  </script>
</head>
<body>
</body>
</html>
